# =============================================================================
# SkillForge LMS — Application Configuration
# =============================================================================
# All sensitive values are injected from environment variables.
# For local development, copy .env.example to .env (or set system env vars).
# =============================================================================

# --- Server -------------------------------------------------------------------
server.port=${PORT:8083}
# Max file upload sizes (increase if needed for large course videos)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=520MB

# --- MongoDB ------------------------------------------------------------------
# Set MONGODB_URI to your Atlas connection string in production
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/skillforge}

# --- JWT Authentication -------------------------------------------------------
# JWT is used for ALL internal frontend <-> backend communication.
# !! CHANGE THIS SECRET in production — minimum 32 characters !!
app.jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_that_is_long_enough_for_hs256_algorithm}
app.jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

# =============================================================================
# EXTERNAL SERVICE INTEGRATIONS
# All external services are optional and controlled via environment variables.
# =============================================================================

# --- Cloudinary (File Uploads: images, videos, documents) --------------------
# Sign up at: https://cloudinary.com — Free tier: 25GB storage, 25GB bandwidth/month
#
# Steps to configure:
#   1. Create account at https://cloudinary.com
#   2. Go to Dashboard → copy Cloud Name, API Key, API Secret
#   3. Set the following environment variables:
#
# CLOUDINARY_CLOUD_NAME=your_cloud_name
# CLOUDINARY_API_KEY=your_api_key
# CLOUDINARY_API_SECRET=your_api_secret
#
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder_api_secret}
# Set to true once Cloudinary credentials are configured
cloudinary.enabled=${CLOUDINARY_ENABLED:false}

# --- Email Service ------------------------------------------------------------
# Choose ONE provider: Resend (recommended) OR SendGrid
# Email sending is disabled by default (email.enabled=false).
# Set email.enabled=true once SMTP credentials are configured.
#
email.enabled=${EMAIL_ENABLED:false}
email.from=${EMAIL_FROM:noreply@skillforge.dev}
email.from-name=${EMAIL_FROM_NAME:SkillForge LMS}

# ---- Option A: Resend (Recommended — https://resend.com) --------------------
# Free tier: 3,000 emails/month, 100/day
# Steps:
#   1. Sign up at https://resend.com
#   2. Verify your domain (or use onboarding@resend.dev for testing)
#   3. Create an API key at https://resend.com/api-keys
#   4. Set:  RESEND_API_KEY=re_xxxxxxxxxxxxxxxxxxxx
#            EMAIL_PROVIDER=resend
#
# RESEND_API_KEY=re_xxxxxxxxxxxxxxxxxxxx

# Spring Mail SMTP for Resend (uncomment and set EMAIL_PROVIDER=resend):
# spring.mail.host=smtp.resend.com
# spring.mail.port=465
# spring.mail.username=resend
# spring.mail.password=${RESEND_API_KEY:}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.ssl.enable=true

# ---- Option B: SendGrid (https://sendgrid.com) -------------------------------
# Free tier: 100 emails/day forever
# Steps:
#   1. Sign up at https://sendgrid.com
#   2. Verify sender identity
#   3. Create API key at Settings → API Keys (select "Mail Send" permission)
#   4. Set:  SENDGRID_API_KEY=SG.xxxxxxxxxxxxxxxxxxxx
#            EMAIL_PROVIDER=sendgrid
#
# SENDGRID_API_KEY=SG.xxxxxxxxxxxxxxxxxxxx

# Spring Mail SMTP for SendGrid (uncomment and set EMAIL_PROVIDER=sendgrid):
# spring.mail.host=smtp.sendgrid.net
# spring.mail.port=587
# spring.mail.username=apikey
# spring.mail.password=${SENDGRID_API_KEY:}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Active email provider: "resend" | "sendgrid" | "none"
email.provider=${EMAIL_PROVIDER:none}

# =============================================================================
# LOGGING
# =============================================================================
logging.level.org.springframework.security=DEBUG
logging.level.com.skillforge=DEBUG
# Suppress verbose mail logs in production (set to WARN)
logging.level.org.springframework.mail=DEBUG
